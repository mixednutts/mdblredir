<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MDBList Redirector - Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { color: #aaa; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: 600; }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      padding: 10px 20px;
      font-size: 14px;
      background: #66a9ed;
      border: none;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #4a8fd4; }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #6c6;
      min-height: 18px;
    }
    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>MDBList Redirector Options</h1>
  <p>An MDBList API key is required for Trakt, TMDB, TVDB, and SIMKL redirects.<br>IMDB redirects work without a key.</p>

  <label for="apikey">MDBList API Key</label>
  <input type="text" id="apikey" placeholder="Paste your API key here">
  <div class="hint">Get your free key from <a href="https://mdblist.com/preferences" target="_blank" style="color:#66a9ed;">mdblist.com/preferences</a></div>

  <button id="save">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
