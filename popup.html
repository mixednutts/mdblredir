<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MDBList Redirector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>MDBList Redirector</h1>

    <div class="section master">
      <label class="toggle-row">
        <span class="label">Enable Redirects</span>
        <label class="toggle">
          <input type="checkbox" id="master">
          <span class="slider"></span>
        </label>
      </label>
    </div>

    <div class="section services" id="services">
      <div class="toggle-row" data-service="imdb">
        <span class="label">IMDB</span>
        <label class="toggle">
          <input type="checkbox" id="imdb">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row locked" data-service="trakt">
        <span class="label">Trakt <span class="lock-hint">🔒</span></span>
        <label class="toggle">
          <input type="checkbox" id="trakt">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row locked" data-service="tmdb">
        <span class="label">TMDB <span class="lock-hint">🔒</span></span>
        <label class="toggle">
          <input type="checkbox" id="tmdb">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row locked" data-service="tvdb">
        <span class="label">TVDB <span class="lock-hint">🔒</span></span>
        <label class="toggle">
          <input type="checkbox" id="tvdb">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row locked" data-service="simkl">
        <span class="label">SIMKL <span class="lock-hint">🔒</span></span>
        <label class="toggle">
          <input type="checkbox" id="simkl">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="section apikey">
      <label class="api-label">MDBList API Key</label>
      <div class="api-row">
        <input type="password" id="apikey-input" placeholder="Paste key here" autocomplete="off">
        <button type="button" id="apikey-toggle" title="Show/hide">👁</button>
        <button id="apikey-save">Save</button>
      </div>
      <div class="api-hint">
        <a href="https://mdblist.com/login/" target="_blank" style="color:#66a9ed;">Get free key</a>
        <span id="apikey-status"></span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
